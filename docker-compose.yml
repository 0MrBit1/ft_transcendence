version: '3.8'

services:
  # Auth Microservice
  auth-service:
    build: ./src/backend/microservices/auth
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
    depends_on:
      - db
    networks:
      - transcendence-net

  # Users Microservice
  users-service:
    build: ./src/backend/microservices/users
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=development
    depends_on:
      - db
    networks:
      - transcendence-net

  # Notifications Microservice
  notifications-service:
    build: ./src/backend/microservices/notifications
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=development
    depends_on:
      - db
    networks:
      - transcendence-net

  # Recommendations Microservice
  recommendations-service:
    build: ./src/backend/microservices/recommendations
    ports:
      - "3004:3004"
    environment:
      - NODE_ENV=development
    depends_on:
      - db
    networks:
      - transcendence-net

  # Health Microservice
  health-service:
    build: ./src/backend/microservices/health
    ports:
      - "3005:3005"
    environment:
      - NODE_ENV=development
    networks:
      - transcendence-net

  # Frontend
  frontend:
    build: ./src/frontend
    ports:
      - "3000:3000"
    depends_on:
      - auth-service
      - users-service
      - notifications-service
      - recommendations-service
      - health-service
    networks:
      - transcendence-net

  # Database
  db:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - transcendence-net

  # Redis for caching
  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    networks:
      - transcendence-net

volumes:
  mongodb_data:

networks:
  transcendence-net:
    driver: bridge
