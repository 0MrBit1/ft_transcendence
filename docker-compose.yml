version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: uniclubs-postgres
    environment:
      POSTGRES_DB: uniclubs
      POSTGRES_USER: uniclubs_user
      POSTGRES_PASSWORD: uniclubs_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - uniclubs-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uniclubs_user -d uniclubs"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    container_name: uniclubs-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - uniclubs-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # NestJS Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: uniclubs-backend
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://uniclubs_user:uniclubs_password@postgres:5432/uniclubs
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=your-super-secret-jwt-key-here
      - JWT_REFRESH_SECRET=your-refresh-secret-here
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - uniclubs-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: uniclubs-frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:3001
      - NEXT_PUBLIC_WS_URL=ws://backend:3001
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - uniclubs-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Caddy Reverse Proxy (for production)
  caddy:
    image: caddy:2-alpine
    container_name: uniclubs-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    networks:
      - uniclubs-network
    profiles:
      - production

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  uniclubs-network:
    driver: bridge
